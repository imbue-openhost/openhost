openapi: 3.0.3
info:
  title: OpenHost Secrets Service
  description: |
    Key-value secret storage, accessed by consumer apps through the V2 service proxy.

    **Service URL:** `github.com/imbue-openhost/openhost/services/secrets`

    All requests are proxied through the openhost router.
    The router injects an `X-OpenHost-Permissions` header containing the
    consumer app's granted permissions. The service validates these
    provider-side before returning data.

    **Permission grant format:** `{"key": "<secret_key>"}` or `{"key": "*"}` for all keys.
  version: 0.1.0

paths:
  /get:
    post:
      summary: Get secret values
      description: |
        Returns the values for the requested secret keys. The caller must have
        a permission grant for each key (or a wildcard `{"key": "*"}` grant).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [keys]
              properties:
                keys:
                  type: array
                  items:
                    type: string
                  description: Secret key names to retrieve.
                  example: ["DB_URL", "API_KEY"]
      responses:
        "200":
          description: Secret values returned.
          content:
            application/json:
              schema:
                type: object
                required: [secrets]
                properties:
                  secrets:
                    type: object
                    additionalProperties:
                      type: string
                    description: Map of key → value for keys that exist.
                    example: {"DB_URL": "postgres://..."}
                  missing:
                    type: array
                    items:
                      type: string
                    description: Keys that were granted but don't exist in the store.
        "400":
          description: No keys requested.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Permission denied — caller lacks grants for one or more keys.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    enum: [permission_required]
                  required_grants:
                    type: array
                    items:
                      type: object
                      properties:
                        key:
                          type: string
                    description: Grant payloads the caller needs to be approved for.

  /list:
    get:
      summary: List available secret keys
      description: |
        Returns the names and descriptions of all secrets in the store.
        Does not require any specific permission grants — key names are
        not considered sensitive.
      responses:
        "200":
          description: List of secret keys.
          content:
            application/json:
              schema:
                type: object
                required: [keys]
                properties:
                  keys:
                    type: array
                    items:
                      type: object
                      required: [key, description]
                      properties:
                        key:
                          type: string
                        description:
                          type: string

components:
  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
        message:
          type: string
