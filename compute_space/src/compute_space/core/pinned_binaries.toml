# Arch-specific downloads for binaries compute_space installs at RUNTIME.
#
# Some tools aren't packaged for every arch we run on, so we fetch a pinned
# release from the vendor's GitHub and verify its sha256 before use.  One block
# per program, with the download URL + sha256 for each arch; adding a pinned
# tool or arch is a data-only change here.
#
# Scope: runtime installs only (loaded by core/pinned_binary.py).  Provisioning-
# time pins (e.g. CoreDNS) live with their ansible task, not here.

[juicefs]
version = "1.3.1"
archive_member = "juicefs"                                  # file to extract from the tarball
[juicefs.arch.amd64]
url = "https://github.com/juicedata/juicefs/releases/download/v1.3.1/juicefs-1.3.1-linux-amd64.tar.gz"
sha256 = "eb67a7be5d174b420cb3734d441971b3a462ab522b78ad2a6ed993e7deddcd44"
[juicefs.arch.arm64]
url = "https://github.com/juicedata/juicefs/releases/download/v1.3.1/juicefs-1.3.1-linux-arm64.tar.gz"
sha256 = "c29bff8f609366011cee03b9abcc76c11a06308b2c314364b8c340a2bfbc6c48"
