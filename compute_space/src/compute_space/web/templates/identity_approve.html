<!DOCTYPE html>
<html>
<head>
  <title>OpenHost - Identity Request</title>
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; max-width: 500px; margin: 4em auto; padding: 0 1em; }
    .info { background: #f0f4ff; border: 1px solid #c0d0f0; border-radius: 6px; padding: 1em; margin: 1em 0; }
    .info dt { font-weight: bold; margin-top: 0.5em; }
    .info dd { margin-left: 0; color: #444; }
    .actions { margin-top: 1.5em; display: flex; gap: 1em; }
    button { padding: 0.5em 1.5em; border-radius: 4px; border: 1px solid #ccc; cursor: pointer; font-size: 1em; }
    .approve { background: #2563eb; color: white; border-color: #2563eb; }
    .approve:hover { background: #1d4ed8; }
    .cancel { background: white; }
    .cancel:hover { background: #f5f5f5; }
  </style>
</head>
<body>
  <h2>Identity Login Request</h2>
  <p>An app is asking you to prove your OpenHost identity.</p>

  <div class="info">
    <dl>
      <dt>App</dt>
      <dd>{{ app_name }}</dd>
      <dt>Hosted on</dt>
      <dd>{{ requesting_domain }}</dd>
    </dl>
  </div>

  <p>If you approve, a signed token proving your identity will be sent back to the app. This token expires in 5 minutes.</p>

  <div class="actions">
    <form method="post" action="/identity/approve">
      <input type="hidden" name="callback" value="{{ callback }}">
      <button type="submit" class="approve">Approve</button>
    </form>
    <button class="cancel" onclick="window.close(); history.back();">Cancel</button>
  </div>
</body>
</html>
