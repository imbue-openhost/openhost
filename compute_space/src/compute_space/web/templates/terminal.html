{% extends "layout.html" %}
{% block title_suffix %} - Terminal{% endblock %}
{% block content %}
<div style="width:calc(100vw - 2em); margin-left:calc((100% - 100vw) / 2 + 1em); height:calc(100vh - 200px); background:#1e1e1e; border-radius:4px; overflow:hidden; padding:8px; box-sizing:border-box;">
  <div id="terminal" style="width:100%; height:100%;"></div>
</div>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
<script id="page-config" type="application/json">
{
  "terminalWsUrl": "{{ 'wss' if request.headers.get('X-Forwarded-Proto', request.scheme) == 'https' else 'ws' }}://{{ request.headers.get('X-Forwarded-Host', request.host) }}/terminal/ws"
}
</script>
<script src="{{ static_url('js/terminal.js') }}"></script>
{% endblock %}
