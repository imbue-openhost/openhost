name: vm-tests

on:
  issue_comment:
    types: [created]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-vm:
    if: >
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '/run-vm-tests')
    # Ubuntu 22.04 uses libguestfs with built-in slirp networking (no passt).
    # Ubuntu 24.04's libguestfs requires passt which doesn't work on GH Actions.
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    steps:
      - name: Get PR branch
        id: pr
        run: |
          PR_JSON=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.issue.number }})
          echo "ref=$(echo "$PR_JSON" | jq -r .head.ref)" >> "$GITHUB_OUTPUT"
          echo "sha=$(echo "$PR_JSON" | jq -r .head.sha)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.ref }}

      - name: Set commit status to pending
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ steps.pr.outputs.sha }} \
            -f state=pending -f context=vm-tests -f description="VM tests running..."
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qemu-system-x86 qemu-utils cloud-image-utils \
            debootstrap ovmf libguestfs-tools
          sudo chmod 0644 /boot/vmlinuz-*
          sudo chmod 666 /dev/kvm

      - uses: astral-sh/setup-uv@v6

      - name: Make uv available to sudo
        run: sudo ln -sf "$(which uv)" /usr/local/bin/uv

      - name: Create multiuser_provider venv with disk-image-create
        run: uv sync --directory multiuser_provider

      - name: Run VM tests
        run: uv run pytest --run-vm -v -s --timeout=2700

      - name: Set commit status to success
        if: success()
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ steps.pr.outputs.sha }} \
            -f state=success -f context=vm-tests -f description="VM tests passed"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Set commit status to failure
        if: failure()
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ steps.pr.outputs.sha }} \
            -f state=failure -f context=vm-tests -f description="VM tests failed"
        env:
          GH_TOKEN: ${{ github.token }}
