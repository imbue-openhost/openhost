name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: pip install pre-commit
      - run: uv run --group dev pre-commit run -a

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv run pytest

  # Note: integration tests that need a correctly-configured rootless
  # podman environment (per-app --uidmap, :idmap bind mounts, etc.) run
  # on real cloud VMs via the e2e workflow rather than here.  The
  # GitHub-hosted runner's containers-storage state and default subuid
  # allocation interact badly with per-app uidmaps in ways that aren't
  # representative of production, so we deliberately don't try to run
  # `pytest --run-podman` under ubuntu-latest.  See tests/test_e2e.py
  # for the full-stack coverage.
