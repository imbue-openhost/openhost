name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: pip install pre-commit
      - run: uv run --group dev pre-commit run -a

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv run pytest

  # Runs full test suite, including containerized tests.
  test-podman:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - name: Install rootless podman runtime
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            podman crun passt slirp4netns netavark aardvark-dns \
            uidmap fuse-overlayfs
      - name: Verify rootless podman works
        run: |
          podman info --format '{{.Host.Security.Rootless}}' | grep -qx true
      - name: Run compute_space and full-stack tests
        run: |
          uv run --group dev pytest compute_space/tests/ tests/test_full_stack.py -v
