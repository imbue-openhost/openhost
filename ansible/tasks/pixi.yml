---
# Install pixi and caddy, and let caddy bind privileged ports.
# CoreDNS is handled separately in coredns.yml (it isn't packaged for every
# arch, so it may come from a pinned download rather than pixi).

- name: Install pixi
  shell: curl -fsSL https://pixi.sh/install.sh | PIXI_VERSION=v0.70.2 bash
  args:
    creates: /home/host/.pixi/bin/pixi

- name: Add pixi to PATH in .bashrc
  lineinfile:
    path: /home/host/.bashrc
    line: 'export PATH="$HOME/.pixi/bin:$PATH"'
    create: yes

- name: Install pixi dependencies (caddy, coredns)
  shell: /home/host/.pixi/bin/pixi install
  args:
    chdir: /home/host/openhost

- name: Find caddy binary path
  shell: /home/host/.pixi/bin/pixi run which caddy
  args:
    chdir: /home/host/openhost
  register: caddy_path
  changed_when: false

- name: Set cap_net_bind_service on caddy
  become: yes
  become_user: root
  shell: setcap 'cap_net_bind_service=+ep' {{ caddy_path.stdout }}

- name: Create resolved.conf.d directory
  become: yes
  become_user: root
  file:
    path: /etc/systemd/resolved.conf.d
    state: directory

- name: Disable systemd-resolved stub listener (frees port 53 for coredns)
  become: yes
  become_user: root
  copy:
    content: "[Resolve]\nDNSStubListener=no\n"
    dest: /etc/systemd/resolved.conf.d/no-stub.conf
  register: resolved_conf

- name: Restart systemd-resolved
  become: yes
  become_user: root
  systemd:
    name: systemd-resolved
    state: restarted
  when: resolved_conf.changed
