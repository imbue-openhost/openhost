---
# Write config, install and start the openhost systemd service.

- name: Create config directory
  file:
    path: /home/host/.openhost/local_compute_space
    state: directory
    owner: host
    group: host

- name: Write compute_space config
  template:
    src: templates/config.toml.j2
    dest: /home/host/.openhost/local_compute_space/config.toml
    owner: host
    group: host
  register: config_file

# Look up the host user's UID so the service template can reference
# the right /run/user/<uid> path and user@<uid>.service unit. The
# host user is created without a fixed UID so the value varies by
# cloud provider (typically 1000 on GCP, 1001 on EC2 / Hetzner).
- name: Resolve host user UID
  getent:
    database: passwd
    key: host
    split: ":"

# The openhost_system_agent CLI is installed only inside the pixi env
# (via [project.scripts]). compute_space invokes it as `sudo
# openhost_system_agent`, but sudo resets PATH to its compiled-in
# secure_path, which does NOT include the pixi env — so the bare name
# can't be found. Symlink it into /usr/local/bin (which IS on
# secure_path) so the privileged agent is reachable from sudo.
- name: Find openhost_system_agent binary path
  shell: /home/host/.pixi/bin/pixi run which openhost_system_agent
  args:
    chdir: /home/host/openhost
  register: system_agent_path
  changed_when: false

- name: Symlink openhost_system_agent onto sudo's secure_path
  become: yes
  become_user: root
  file:
    src: "{{ system_agent_path.stdout | trim }}"
    dest: /usr/local/bin/openhost_system_agent
    state: link
    force: yes

- name: Install openhost systemd service
  become: yes
  become_user: root
  template:
    src: templates/openhost.service.j2
    dest: /etc/systemd/system/openhost.service
  vars:
    host_uid: "{{ ansible_facts['getent_passwd'].host[1] }}"
  register: service_file

- name: Reload systemd
  become: yes
  become_user: root
  systemd:
    daemon_reload: yes
  when: service_file.changed

- name: Enable openhost service
  become: yes
  become_user: root
  systemd:
    name: openhost
    enabled: yes
