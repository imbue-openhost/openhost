---
# Domain-INDEPENDENT systemd unit install: resolve the host UID, symlink the
# system-agent onto sudo's secure_path, install the pixi-reclaim script, render
# and install the openhost + openhost-juicefs unit files, reload systemd, and
# enable the service. Contains NOTHING that needs `domain` — so a warm-pool
# prebake can install the units without knowing the eventual domain. The
# domain-dependent config.toml + claim token live in tasks/write_openhost_config.yml.
#
# Note: this installs the unit files but does NOT enable or start the service.
# Both enable (boot persistence) and start live in
# tasks/restart_openhost_service.yml, gated by skip_service_start — so a
# domain-less prebaked host never auto-starts openhost (e.g. on reboot) with no
# config.toml and no claim token. Finalize is what enables + starts it.

# Look up the host user's UID so the service template can reference
# the right /run/user/<uid> path and user@<uid>.service unit. The
# host user is created without a fixed UID so the value varies by
# cloud provider (typically 1000 on GCP, 1001 on EC2 / Hetzner).
- name: Resolve host user UID
  getent:
    database: passwd
    key: host
    split: ":"

# The openhost_system_agent CLI is installed only inside the pixi env
# (via [project.scripts]). compute_space invokes it as `sudo
# openhost_system_agent`, but sudo resets PATH to its compiled-in
# secure_path, which does NOT include the pixi env — so the bare name
# can't be found. Symlink it into /usr/local/bin (which IS on
# secure_path) so the privileged agent is reachable from sudo.
- name: Find openhost_system_agent binary path
  shell: /home/host/.pixi/bin/pixi run which openhost_system_agent
  args:
    chdir: /home/host/openhost
  register: system_agent_path
  changed_when: false

- name: Symlink openhost_system_agent onto sudo's secure_path
  become: yes
  become_user: root
  file:
    src: "{{ system_agent_path.stdout | trim }}"
    dest: /usr/local/bin/openhost_system_agent
    state: link
    force: yes

# The reclaim script the unit's ExecStartPre invokes (see tasks/reclaim_pixi.yml,
# imported earlier) is installed there — up front, before the host-user git/pixi
# steps — so it is already in place by the time this unit references it.
- name: Install openhost systemd service
  become: yes
  become_user: root
  template:
    src: templates/openhost.service.j2
    dest: /etc/systemd/system/openhost.service
  vars:
    host_uid: "{{ ansible_facts['getent_passwd'].host[1] }}"
  register: service_file

# JuiceFS archive-tier mount: a dedicated systemd service with
# Restart=always so the FUSE mount recovers automatically if the
# JuiceFS process is OOM-killed or crashes.  Installed disabled;
# compute_space enables it when the operator configures S3.
- name: Install openhost-juicefs systemd service
  become: yes
  become_user: root
  template:
    src: templates/openhost-juicefs.service.j2
    dest: /etc/systemd/system/openhost-juicefs.service
  vars:
    juicefs_env_file: /home/host/.openhost/local_compute_space/persistent_data/openhost/juicefs/juicefs.env
  register: juicefs_service_file

- name: Reload systemd
  become: yes
  become_user: root
  systemd:
    daemon_reload: yes
  when: service_file.changed or juicefs_service_file.changed

# Enabling openhost is deliberately NOT done here — see the note at the top of
# this file. It happens in tasks/restart_openhost_service.yml alongside the
# start, so a prebaked (domain-less) host stays fully dormant.

# Do NOT enable openhost-juicefs here; it stays disabled until the
# operator configures the archive backend via the dashboard.  The
# compute_space code enables + starts it at that point.
