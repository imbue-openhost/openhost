---
# Configure host-side rootless container runtime.  Podman itself is
# installed via pixi (see pyproject.toml); this file installs the
# system-only bits (setuid newuidmap/newgidmap, pasta) and writes
# host-wide config that podman reads from /etc/containers.
# Runs with become: yes.

# Hosts provisioned before podman moved to pixi have apt-installed
# /usr/bin/podman and /usr/bin/crun.  The systemd unit's PATH puts
# the pixi env first so this isn't strictly hazardous, but leaving
# two copies invites drift (different versions, different config
# search paths for interactive invocations).  Remove idempotently —
# no-op on fresh hosts.
- name: Remove apt-installed podman + crun (now managed by pixi)
  apt:
    name:
      - podman
      - crun
    state: absent

- name: Install rootless container support packages
  apt:
    name:
      # newuidmap/newgidmap for podman's rootless userns setup.
      # Setuid root, so must come from apt — pixi can't ship these.
      - uidmap
      # passt provides `pasta`, the default rootless network backend.
      - passt
      # golang-github-containers-common provides /etc/containers/
      # policy.json (image signature policy), default registries.conf,
      # storage.conf, etc.  The conda-forge containers-common installs
      # equivalents under the pixi env prefix, but podman searches /etc
      # and ~/.config at runtime — without this, container builds fail
      # with "no policy.json file found".  (Debian/Ubuntu ship it under
      # this name; upstream calls it just "containers-common".)
      - golang-github-containers-common
    state: present
    update_cache: yes

# Without lingering, the user's systemd instance exits when the last
# session ends, which would kill `podman run --restart=...` containers.
- name: Check whether user lingering is already enabled for host
  stat:
    path: /var/lib/systemd/linger/host
  register: _linger_sentinel

- name: Enable user lingering for host
  command: loginctl enable-linger host
  when: not _linger_sentinel.stat.exists
  changed_when: true

# Rootless podman needs to publish ports >= 25 (the router's [[ports]]
# binds on 0.0.0.0:<host_port>).  25 is chosen so SMTP-serving apps can
# bind port 25 directly.  Must match
# compute_space.core.manifest.UNPRIVILEGED_PORT_FLOOR.
#
# kernel.apparmor_restrict_unprivileged_userns=0: Ubuntu 24.04 blocks
# unprivileged user namespaces unless the calling binary has an
# AppArmor profile.  The apt podman package ships one; the
# conda-forge build we now install via pixi does not, so podman's
# rootless reexec fails with "failed to reexec: Permission denied"
# until we lift the restriction.  We could ship a custom profile
# instead, but the sysctl is simpler and the security trade-off is
# small on a single-purpose host.
- name: Configure podman-related sysctls
  copy:
    content: |
      # Managed by OpenHost; do not edit by hand.
      net.ipv4.ip_unprivileged_port_start = 25
      kernel.apparmor_restrict_unprivileged_userns = 0
    dest: /etc/sysctl.d/90-openhost-podman.conf
    mode: "0644"

- name: Apply podman sysctls
  command: sysctl -p /etc/sysctl.d/90-openhost-podman.conf
  changed_when: false

# Unlike Docker, podman has no default registry.  Set docker.io as
# the short-name search registry so unqualified `FROM` lines in app
# Dockerfiles resolve without operator intervention.
#
# We overwrite /etc/containers/registries.conf rather than using a
# drop-in because Ubuntu's apt golang-github-containers-common ships
# its own drop-in (/etc/containers/registries.conf.d/shortnames.conf)
# that we observed clobbering a `00-openhost.conf` drop-in's value
# for unqualified-search-registries on the e2e VMs.  Writing the
# main file directly sidesteps the merge order entirely; we keep
# short-name-mode = permissive so unqualified pulls don't error out
# on a missing alias.
- name: Ensure /etc/containers exists
  file:
    path: /etc/containers
    state: directory
    mode: "0755"

- name: Configure podman registries
  copy:
    content: |
      # Managed by OpenHost; do not edit by hand.
      unqualified-search-registries = ["docker.io"]
      short-name-mode = "permissive"
    dest: /etc/containers/registries.conf
    mode: "0644"

# Every bind mount uses `:idmap`.  Supported filesystems: ext4 (reported
# as ext2/ext3 by stat -f -c '%T'), xfs, btrfs, tmpfs.  ZFS < 2.2 and
# certain FUSE filesystems don't support it.
- name: Find filesystem of data root
  command: stat -f -c '%T' /home/host
  register: _data_fs
  changed_when: false

- name: Verify data filesystem supports idmapped mounts
  assert:
    that:
      - _data_fs.stdout in ['ext2/ext3', 'xfs', 'btrfs', 'tmpfs']
    fail_msg: >-
      Filesystem {{ _data_fs.stdout }} for /home/host does not reliably
      support idmapped bind mounts.  Reprovision onto ext4, xfs, btrfs,
      or tmpfs.  (Note: Linux reports every ext2/3/4 filesystem as
      'ext2/ext3', so ext4 IS supported — this failure means something
      else entirely, e.g. ZFS or a FUSE filesystem.)
    success_msg: "Filesystem {{ _data_fs.stdout }} supports idmapped mounts."

# /etc/openhost/runtime is read by compute_space.core.runtime_sentinel
# and the dashboard update-check endpoint.  Bump runtime_version here
# AND compute_space.core.runtime_sentinel.EXPECTED_RUNTIME_VERSION
# together whenever a host-side change ships that existing hosts must
# adopt before their next router restart.
- name: Ensure /etc/openhost exists
  file:
    path: /etc/openhost
    state: directory
    mode: "0755"

- name: Write host runtime sentinel
  copy:
    content: |
      # Managed by ansible/tasks/containers.yml; do not edit by hand.
      runtime=podman
      runtime_version=1
    dest: /etc/openhost/runtime
    mode: "0644"
