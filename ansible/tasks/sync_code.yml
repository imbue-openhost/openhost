---
# Clone repo from GitHub and checkout a specific ref (branch, tag, or commit).
# Pass -e openhost_branch=<branch> to deploy a branch (e.g. samuel/arm-support).
# Pass -e openhost_commit=<sha> to pin an exact commit (used when
#   openhost_branch is not set).
# Pass -e openhost_refspec=<ref> to also fetch a ref that the commit lives on
#   (e.g. refs/pull/N/merge), for commits not reachable from any branch.
# Precedence: openhost_branch > openhost_commit > main.

- name: Clone or update openhost repo
  ansible.builtin.git:
    repo: https://github.com/imbue-openhost/openhost.git
    dest: /home/host/openhost
    version: "{{ openhost_branch | default(openhost_commit | default('main'), true) }}"
    refspec: "{{ openhost_refspec | default(omit) }}"
    force: true

- name: Remove untracked files from openhost repo
  ansible.builtin.command:
    cmd: git clean -fd
    chdir: /home/host/openhost
  register: git_clean_result
  changed_when: git_clean_result.stdout | length > 0

- name: Copy ACME account key
  copy:
    src: "{{ playbook_dir }}/secrets/certbot_private_key.json"
    dest: /home/host/openhost/ansible/secrets/certbot_private_key.json
    owner: host
    group: host
    mode: "0600"
