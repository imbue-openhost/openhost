---
# Configure swap space and install CRIU for app suspension.

- name: Check if swapfile already exists
  stat:
    path: /swapfile
  register: _swapfile

- name: Create 4 GiB swapfile
  command: fallocate -l 4G /swapfile
  when: not _swapfile.stat.exists
  changed_when: true

- name: Set swapfile permissions
  file:
    path: /swapfile
    mode: "0600"
    owner: root
    group: root

- name: Format swapfile
  command: mkswap /swapfile
  when: not _swapfile.stat.exists
  changed_when: true

- name: Enable swapfile
  command: swapon /swapfile
  when: not _swapfile.stat.exists
  changed_when: true

- name: Persist swapfile in /etc/fstab
  lineinfile:
    path: /etc/fstab
    line: "/swapfile none swap sw 0 0"
    state: present

- name: Set vm.swappiness
  sysctl:
    name: vm.swappiness
    value: "10"
    state: present
    sysctl_file: /etc/sysctl.d/90-openhost-swap.conf
    reload: yes

- name: Install runc (real opencontainers runc for CRIU checkpoint support)
  apt:
    name: runc
    state: present
    update_cache: yes

- name: Install CRIU build dependencies
  apt:
    name:
      - build-essential
      - libprotobuf-dev
      - libprotobuf-c-dev
      - protobuf-c-compiler
      - protobuf-compiler
      - pkg-config
      - python3-protobuf
      - libnl-3-dev
      - libcap-dev
      - libaio-dev
      - libgnutls28-dev
      - libnet-dev
      - uuid-dev
      - libbsd-dev
      - python3-yaml
    state: present
    update_cache: yes

- name: Download CRIU source
  get_url:
    url: "https://github.com/checkpoint-restore/criu/archive/refs/tags/v4.1.tar.gz"
    dest: /tmp/criu.tar.gz

- name: Extract CRIU source
  unarchive:
    src: /tmp/criu.tar.gz
    dest: /tmp
    remote_src: yes
    creates: /tmp/criu-4.1

- name: Build CRIU
  make:
    chdir: /tmp/criu-4.1
    target: criu/criu
  args:
    creates: /tmp/criu-4.1/criu/criu

- name: Install CRIU binary
  copy:
    src: /tmp/criu-4.1/criu/criu
    dest: /usr/local/sbin/criu
    mode: "0755"
    remote_src: yes

- name: Symlink CRIU into /usr/local/bin so runc can find it in PATH
  file:
    src: /usr/local/sbin/criu
    dest: /usr/local/bin/criu
    state: link

- name: Create containers config directory for host user
  file:
    path: /home/host/.config/containers
    state: directory
    owner: host
    group: host
    mode: "0755"

- name: Configure host user containers.conf to use apt runc for CRIU checkpoint support
  copy:
    dest: /home/host/.config/containers/containers.conf
    owner: host
    group: host
    mode: "0644"
    content: |
      [engine]
      runtime = "runc"

      [engine.runtimes]
      runc = [
          "/usr/sbin/runc",
          "/usr/bin/runc",
          "/usr/local/bin/runc",
      ]
