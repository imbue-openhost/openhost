---
# Configure swap space and install CRIU for app suspension.

- name: Check if swapfile already exists
  stat:
    path: /swapfile
  register: _swapfile

- name: Create 4 GiB swapfile
  command: fallocate -l 4G /swapfile
  when: not _swapfile.stat.exists
  changed_when: true

- name: Set swapfile permissions
  file:
    path: /swapfile
    mode: "0600"
    owner: root
    group: root

- name: Format swapfile
  command: mkswap /swapfile
  when: not _swapfile.stat.exists
  changed_when: true

- name: Enable swapfile
  command: swapon /swapfile
  when: not _swapfile.stat.exists
  changed_when: true

- name: Persist swapfile in /etc/fstab
  lineinfile:
    path: /etc/fstab
    line: "/swapfile none swap sw 0 0"
    state: present

- name: Set vm.swappiness
  sysctl:
    name: vm.swappiness
    value: "10"
    state: present
    sysctl_file: /etc/sysctl.d/90-openhost-swap.conf
    reload: yes

- name: Install runc (real opencontainers runc for CRIU checkpoint support)
  apt:
    name: runc
    state: present
    update_cache: yes

- name: Install CRIU build dependencies
  apt:
    name:
      - build-essential
      - libprotobuf-dev
      - libprotobuf-c-dev
      - protobuf-c-compiler
      - protobuf-compiler
      - pkg-config
      - python3-protobuf
      - libnl-3-dev
      - libcap-dev
      - libaio-dev
      - libgnutls28-dev
      - libnet-dev
      - uuid-dev
      - libbsd-dev
      - python3-yaml
    state: present
    update_cache: yes

- name: Download CRIU source
  get_url:
    url: "https://github.com/checkpoint-restore/criu/archive/refs/tags/v4.1.tar.gz"
    dest: /tmp/criu.tar.gz

- name: Extract CRIU source
  unarchive:
    src: /tmp/criu.tar.gz
    dest: /tmp
    remote_src: yes
    creates: /tmp/criu-4.1

- name: Build CRIU
  make:
    chdir: /tmp/criu-4.1
    target: criu/criu
  args:
    creates: /tmp/criu-4.1/criu/criu

- name: Install CRIU binary
  copy:
    src: /tmp/criu-4.1/criu/criu
    dest: /usr/local/sbin/criu
    mode: "0755"
    remote_src: yes

- name: Install CRIU wrapper at /usr/local/bin/criu
  copy:
    dest: /usr/local/bin/criu
    mode: "0755"
    content: |
      #!/bin/sh
      CRIU=/usr/local/sbin/criu
      if [ "$(id -u)" != "0" ] && [ "${1:-}" = "check" ]; then
          exec "$CRIU" check --unprivileged "$@"
      fi
      exec "$CRIU" "$@"

- name: Create containers config directory for host user
  file:
    path: /home/host/.config/containers
    state: directory
    owner: host
    group: host
    mode: "0755"

- name: Configure host user containers.conf to use apt runc for CRIU checkpoint support
  copy:
    dest: /home/host/.config/containers/containers.conf
    owner: host
    group: host
    mode: "0644"
    content: |
      [engine]
      runtime = "runc"

      [engine.runtimes]
      runc = [
          "/usr/sbin/runc",
          "/usr/bin/runc",
          "/usr/local/bin/runc",
      ]

- name: Install openhost-runc wrapper
  copy:
    dest: /usr/local/sbin/openhost-runc
    mode: "0755"
    content: |
      #!/bin/sh
      HOST_UID=$(getent passwd host | cut -d: -f3)
      exec /usr/sbin/runc --root "/run/user/${HOST_UID}/runc" "$@"

- name: Install openhost-checkpoint helper script
  copy:
    dest: /usr/local/bin/openhost-checkpoint
    mode: "0755"
    content: |
      #!/bin/sh
      # Usage: openhost-checkpoint CONTAINER_ID CHECKPOINT_PATH
      # Caller (compute_space, rootless) resolves name→ID before invoking this.
      set -e
      [ $# -eq 2 ] || { echo "Usage: $0 CONTAINER_ID CHECKPOINT_PATH" >&2; exit 1; }
      HOST_UID=$(getent passwd host | cut -d: -f3)
      RUNC_ROOT="/run/user/${HOST_UID}/runc"
      BUNDLE=/home/host/.local/share/containers/storage/overlay-containers/$1/userdata
      [ -d "${BUNDLE}" ] || { echo "Bundle for $1 not found" >&2; exit 1; }
      /usr/sbin/runc --root "${RUNC_ROOT}" \
          checkpoint \
          --image-path "${BUNDLE}/checkpoint" \
          --work-path "${BUNDLE}" \
          "$1"
      tar -czf "$2" -C "${BUNDLE}" checkpoint config.json artifacts
      chown -R host:host "${BUNDLE}/checkpoint" "${BUNDLE}/dump.log"
      chown host:host "$2"

- name: Install openhost-restore helper script
  copy:
    dest: /usr/local/bin/openhost-restore
    mode: "0755"
    content: |
      #!/bin/sh
      # Usage: openhost-restore CHECKPOINT_PATH
      # Root podman is required (rootless restore is also blocked by podman).
      # Ownership is fixed after so rootless podman can manage the container.
      set -e
      [ $# -eq 1 ] || { echo "Usage: $0 CHECKPOINT_PATH" >&2; exit 1; }
      HOST_UID=$(getent passwd host | cut -d: -f3)
      /home/host/openhost/.pixi/envs/default/bin/podman \
          --runtime /usr/local/sbin/openhost-runc \
          --conmon /home/host/openhost/.pixi/envs/default/bin/conmon \
          --root /home/host/.local/share/containers/storage \
          --runroot "/run/user/${HOST_UID}/containers" \
          container restore \
          --import "$1"
      find /home/host/.local/share/containers/storage -not -user host \
          -exec chown host:host {} + 2>/dev/null || true
      find "/run/user/${HOST_UID}/containers" -not -user host \
          -exec chown host:host {} + 2>/dev/null || true

- name: Create root containers config directory
  file:
    path: /root/.config/containers
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Configure root containers.conf to use runc wrapper for checkpoint
  copy:
    dest: /root/.config/containers/containers.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      [engine]
      runtime = "runc"

      [engine.runtimes]
      runc = [
          "/usr/local/sbin/openhost-runc",
      ]

- name: Install sudoers rule for checkpoint helpers
  copy:
    dest: /etc/sudoers.d/openhost-checkpoint
    mode: "0440"
    validate: visudo -cf %s
    content: |
      # Allow the openhost service user to checkpoint/restore containers
      # via privileged helpers that access the rootless container storage.
      host ALL=(root) NOPASSWD: /usr/local/bin/openhost-checkpoint
      host ALL=(root) NOPASSWD: /usr/local/bin/openhost-restore
