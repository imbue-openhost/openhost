---
# Install rootless Podman for the `host` user.  Runs with become: yes.
#
# OpenHost runs every app container under the unprivileged `host` user via
# rootless podman + per-app --uidmap.  This task installs the runtime,
# allocates the subuid/subgid range each app draws from, enables user
# systemd lingering so containers survive reboots, lowers the unprivileged
# port floor so apps can publish ports >= 80, and fails the play early if
# the data filesystem doesn't support idmapped bind mounts.

# ---------------------------------------------------------------------------
# Packages
# ---------------------------------------------------------------------------

- name: Install podman and rootless networking tooling
  apt:
    name:
      # podman + its default OCI runtime
      - podman
      - crun
      # Rootless networking backends.  passt provides `pasta` (preferred);
      # slirp4netns is the fallback used when pasta is unavailable.
      # Install both for resilience across Ubuntu minor versions.
      - passt
      - slirp4netns
      # netavark + aardvark-dns are Podman's rootless-friendly CNI
      # replacement, needed for user-defined podman networks.
      - netavark
      - aardvark-dns
      # uidmap ships newuidmap/newgidmap, required to set up unprivileged
      # user namespaces with ranges larger than a single UID.
      - uidmap
      # Rootless overlay fallback for kernels that don't expose the native
      # unprivileged overlay mount.  Harmless when unused.
      - fuse-overlayfs
    state: present
    update_cache: yes

# ---------------------------------------------------------------------------
# subuid / subgid allocation for the host user
# ---------------------------------------------------------------------------
#
# Every app gets its own disjoint 65536-UID window inside the host's subuid
# range, keyed by app id (see compute_uid_map_base).  10,000,000 – 20,000,000
# gives room for ~150 apps without collision and doesn't overlap with any
# UID the host itself assigns.

- name: Allocate subuid range to host user
  lineinfile:
    path: /etc/subuid
    regexp: '^host:'
    line: "host:10000000:10000000"
    create: yes
    mode: "0644"

- name: Allocate subgid range to host user
  lineinfile:
    path: /etc/subgid
    regexp: '^host:'
    line: "host:10000000:10000000"
    create: yes
    mode: "0644"

# ---------------------------------------------------------------------------
# systemd user lingering
# ---------------------------------------------------------------------------
#
# Without lingering, the user's systemd instance exits when the last
# interactive session ends, which would kill any `podman run --restart=...`
# containers.  Lingering starts the user manager at boot.

- name: Enable user lingering for host
  command: loginctl enable-linger host
  args:
    creates: /var/lib/systemd/linger/host
  register: _linger_result
  changed_when: _linger_result.rc == 0

# ---------------------------------------------------------------------------
# sysctl: allow rootless binding to common ports
# ---------------------------------------------------------------------------
#
# By default the kernel reserves ports < 1024 for root.  Rootless podman
# needs to publish app ports (the router's [[ports]] manifest field binds
# on 0.0.0.0:<host_port>), so we lower the floor to 80.  This matches what
# pixi.yml already does for caddy/coredns via setcap — same idea, different
# mechanism.  The manifest parser rejects host_port values below this floor
# (see compute_space.core.manifest.UNPRIVILEGED_PORT_FLOOR).

- name: Configure unprivileged port floor
  copy:
    content: |
      # Allow unprivileged processes (rootless podman containers) to bind
      # TCP/UDP ports >= 80.  Managed by OpenHost; do not edit by hand.
      net.ipv4.ip_unprivileged_port_start = 80
    dest: /etc/sysctl.d/90-openhost-podman.conf
    mode: "0644"

- name: Apply unprivileged port sysctl
  command: sysctl -p /etc/sysctl.d/90-openhost-podman.conf
  changed_when: false

# ---------------------------------------------------------------------------
# Idmapped mount sanity check
# ---------------------------------------------------------------------------
#
# Every bind mount from the router uses ``:idmap`` so container-root file
# writes land on disk owned by the host user rather than by the mapped
# subuid.  idmapped mounts require:
#   - Linux >= 5.12 (6.8 on Ubuntu 24.04 — fine)
#   - filesystem that supports it (ext4, xfs, btrfs, tmpfs are all OK;
#     some exotic setups like ZFS < 2.2 or certain fuse filesystems are not)
#
# We check the filesystem of the OpenHost data root and fail loudly here
# rather than letting the router fail at runtime with a confusing error.

- name: Find filesystem of data root
  command: stat -f -c '%T' /home/host
  register: _data_fs
  changed_when: false

- name: Verify data filesystem supports idmapped mounts
  # Note: `stat -f -c '%T'` reports the kernel's type name for the
  # filesystem.  Ext2, ext3 and ext4 all share the reported name
  # 'ext2/ext3' (the kernel uses the same on-disk family name), so a
  # distinct 'ext4' entry would never match on Linux — keep the shared
  # name in the allowlist.
  assert:
    that:
      - _data_fs.stdout in ['ext2/ext3', 'xfs', 'btrfs', 'tmpfs']
    fail_msg: >-
      Filesystem {{ _data_fs.stdout }} for /home/host does not reliably
      support idmapped bind mounts.  Rootless podman with per-app uidmaps
      will not work here.  Reprovision onto ext4/xfs/btrfs.
    success_msg: "Filesystem {{ _data_fs.stdout }} supports idmapped mounts."

# ---------------------------------------------------------------------------
# Sanity probe
# ---------------------------------------------------------------------------

- name: Verify podman works for host user
  become: yes
  become_user: host
  command: podman info --format json
  register: _podman_info
  changed_when: false

- name: Assert podman is running rootless
  assert:
    that:
      - (_podman_info.stdout | from_json).host.security.rootless | bool
    fail_msg: >-
      podman is not configured for rootless operation as the host user.
      subuid/subgid may not have been allocated correctly.
    success_msg: "podman rootless for host user: OK"
