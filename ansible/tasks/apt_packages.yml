---
# Install base apt packages. Runs with become: yes.

- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

# dist-upgrade takes 7-10 min on a fresh Ubuntu image and is the slowest
# step by far.  For ephemeral CI instances that are torn down after a single
# test run, it's unnecessary.  Pass -e skip_apt_upgrade=true to skip it.
- name: Upgrade all packages
  apt:
    upgrade: dist
  when: not (skip_apt_upgrade | default(false) | bool)

- name: Install base packages
  apt:
    name:
      - git
      - curl
      - wget
      - openssh-server
      - ca-certificates
      - gnupg
      # fuse3 ships fusermount3, which JuiceFS uses for the
      # archive-tier mount.  Already a transitive dep of plenty
      # of things on Ubuntu but pin it explicitly so the
      # archive backend can't fail-to-mount on a stripped image.
      - fuse3
    state: present

# coredns is not published for linux-aarch64 on conda-forge, and is not in the
# Raspberry Pi OS apt repos.  Download the official binary from GitHub releases.
# On x86-64 it is managed by pixi (see pixi.yml).
- name: Download coredns binary from GitHub releases (aarch64 only)
  get_url:
    url: "https://github.com/coredns/coredns/releases/download/v1.14.4/coredns_1.14.4_linux_arm64.tgz"
    dest: /tmp/coredns.tgz
    mode: "0644"
  when: ansible_architecture == "aarch64"

- name: Extract coredns binary (aarch64 only)
  unarchive:
    src: /tmp/coredns.tgz
    dest: /usr/local/bin/
    remote_src: yes
  when: ansible_architecture == "aarch64"

- name: Remove coredns archive (aarch64 only)
  file:
    path: /tmp/coredns.tgz
    state: absent
  when: ansible_architecture == "aarch64"

# networkd-dispatcher runs the boot-time script that re-applies the hairpin NAT
# iptables rules.  Ubuntu ships it by default; Debian may not.
- name: Install networkd-dispatcher
  apt:
    name: networkd-dispatcher
    state: present

# JuiceFS mounts the archive tier with -o allow_other so apps
# running under rootless-podman's subuid namespace can traverse
# it.  fusermount refuses allow_other unless this option is set
# in /etc/fuse.conf.  Idempotent.
- name: Enable user_allow_other in /etc/fuse.conf
  lineinfile:
    path: /etc/fuse.conf
    regexp: '^#?\s*user_allow_other\s*$'
    line: 'user_allow_other'
    state: present
    create: false
