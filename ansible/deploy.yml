---
# Fast re-deploy: clone/update code from GitHub and restart the service.
# Usage: ansible-playbook ansible/deploy.yml -i <IP>, -e domain=<domain>
# Optional: -e openhost_branch=<branch> to deploy a branch (defaults to main),
#           or -e openhost_commit=<sha> to pin an exact commit.

- name: Deploy OpenHost
  hosts: all
  user: host
  tasks:
    - import_tasks: tasks/reclaim_pixi.yml
    - import_tasks: tasks/sync_code.yml
    - import_tasks: tasks/restart_openhost_service.yml
