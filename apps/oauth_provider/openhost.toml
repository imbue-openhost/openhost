[app]
name = "oauth-provider"
version = "0.1.0"
description = "OAuth token management — acquire, refresh, and store tokens for third-party APIs"

[runtime.container]
image = "Dockerfile"
port = 8080

[routing]
public_paths = ["/callback", "/device", "/grant"]

[resources]
memory_mb = 256
cpu_millicores = 1000

[data]
sqlite = ["main"]

[[services.v2.provides]]
service = "github.com/imbue-openhost/openhost/services/oauth"
version = "0.1.0"
endpoint = "/oauth_service/"

[[services.v2.consumes]]
service = "github.com/imbue-openhost/openhost/services/secrets"
shortname = "secrets"
version = ">=0.1.0"
grants = [
    {key = "GOOGLE_OAUTH_CLIENT_ID"},
    {key = "GOOGLE_OAUTH_CLIENT_SECRET"},
]
