[app]
name = "oauth-demo"
version = "0.1.0"
description = "Demo app exercising the secrets app OAuth flow"

[runtime.container]
image = "Dockerfile"
port = 8080

[resources]
memory_mb = 256
cpu_millicores = 500

[[services.v2.consumes]]
service = "github.com/imbue-openhost/openhost/services/oauth"
shortname = "oauth"
version = ">=0.1.0"
grants = [
    {provider = "google", scopes = ["https://www.googleapis.com/auth/gmail.readonly"]},
    {provider = "github", scopes = ["repo"]},
]
