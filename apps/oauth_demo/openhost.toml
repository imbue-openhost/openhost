[app]
name = "oauth-demo"
version = "0.1.0"
description = "Demo app exercising the secrets app OAuth flow"

[runtime.container]
image = "Dockerfile"
port = 8080

[resources]
memory_mb = 256
cpu_millicores = 500

[[permissions_v2]]
service = "github.com/imbue-openhost/openhost/services/oauth"
grants = [
    {provider = "google", scope = "https://www.googleapis.com/auth/gmail.readonly"},
    {provider = "github", scope = "repo"},
]
