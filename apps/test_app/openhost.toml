[app]
name = "test-app"
version = "0.1.0"
description = "Minimal app for testing"
hidden = true

[runtime.container]
image = "Dockerfile"
port = 5000

[routing]
health_check = "/health"

[[services.v2.consumes]]
service = "github.com/imbue-openhost/openhost/services/secrets"
shortname = "secrets"
version = ">=0.1.0"
grants = [{ key = "TEST_SECRET" }]

[resources]
memory_mb = 64
cpu_millicores = 100
