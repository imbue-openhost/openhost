[app]
name = "secrets-v1"
version = "0.1.0"
description = "Manage environment variable secrets for other apps"

[runtime.container]
image = "Dockerfile"
port = 8080

[routing]
public_paths = ["/oauth/callback", "/oauth/device"]

[resources]
memory_mb = 256
cpu_millicores = 1000

[data]
sqlite = ["main"]

[services]
provides = ["secrets"]
