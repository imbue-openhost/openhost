[app]
name = "secrets"
version = "0.1.0"
description = "Manage environment variable secrets for other apps"

[runtime.container]
image = "Dockerfile"
port = 8080

[routing]
public_paths = ["/oauth/callback", "/oauth/device"]

[resources]
memory_mb = 256
cpu_millicores = 1000

[data]
sqlite = ["main"]

[services]
provides = ["secrets"]

[[services_v2.provides]]
service = "github.com/imbue-openhost/openhost/services/secrets"
version = "0.1.0"
endpoint = "/_service_v2/"

[[services_v2.provides]]
service = "github.com/imbue-openhost/openhost/services/oauth"
version = "0.1.0"
endpoint = "/_oauth_v2/"
